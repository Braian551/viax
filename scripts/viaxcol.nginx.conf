server {
    listen 443 ssl;
    server_name viaxcol.online www.viaxcol.online;

    root /var/www/viax/sitioweb;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }

    ssl_certificate /etc/letsencrypt/live/viaxcol.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viaxcol.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name viaxcol.online www.viaxcol.online;
    return 301 https://$host$request_uri;
}
